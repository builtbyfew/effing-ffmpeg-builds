name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "FFmpeg version to build (e.g. 6.1.4)"
        required: true
        type: string
      overwrite:
        description: "Delete and recreate the release if it already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build in Alpine container
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker run --rm -v "$PWD:/w" -w /w -e VERSION alpine:3.19 sh -c '
            set -e
            apk add --no-cache build-base nasm coreutils curl tar xz git pkgconfig bash mbedtls-dev mbedtls-static zlib-dev zlib-static
            ./build.sh "$VERSION" ffmpeg-linux-x64
          '
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x64
          path: ffmpeg-linux-x64
          if-no-files-found: error

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build in Alpine container
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker run --rm -v "$PWD:/w" -w /w -e VERSION alpine:3.19 sh -c '
            set -e
            apk add --no-cache build-base nasm coreutils curl tar xz git pkgconfig bash mbedtls-dev mbedtls-static zlib-dev zlib-static
            ./build.sh "$VERSION" ffmpeg-linux-arm64
          '
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64
          path: ffmpeg-linux-arm64
          if-no-files-found: error

  build-darwin-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: brew install nasm cmake
      - name: Build
        run: ./build.sh "${{ inputs.version }}" ffmpeg-darwin-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-darwin-x64
          path: ffmpeg-darwin-x64
          if-no-files-found: error

  build-darwin-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: brew install nasm cmake
      - name: Build
        run: ./build.sh "${{ inputs.version }}" ffmpeg-darwin-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-darwin-arm64
          path: ffmpeg-darwin-arm64
          if-no-files-found: error

  build-win32-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-mbedtls
            mingw-w64-x86_64-zlib
            git
      - name: Build
        env:
          VERSION: ${{ inputs.version }}
        run: ./build.sh "$VERSION" ffmpeg-win32-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win32-x64
          path: ffmpeg-win32-x64
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-darwin-x64
      - build-darwin-arm64
      - build-win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Gzip binaries and fetch LICENSE
        run: |
          set -eux
          cd artifacts
          ls -lh
          for f in ffmpeg-darwin-arm64 ffmpeg-darwin-x64 ffmpeg-linux-arm64 ffmpeg-linux-x64 ffmpeg-win32-x64; do
            chmod +x "$f"
            gzip --best -k "$f"
          done
          curl -fL -o LICENSE.txt \
            "https://git.ffmpeg.org/gitweb/ffmpeg.git/blob_plain/n${{ inputs.version }}:/LICENSE.md"
          ls -lh

      - name: Delete existing release and tag (if overwrite)
        if: ${{ inputs.overwrite }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="v${{ inputs.version }}"
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          TAG="v${{ inputs.version }}"
          cd artifacts
          gh release create "$TAG" \
            --title "FFmpeg ${{ inputs.version }}" \
            --notes "Static FFmpeg ${{ inputs.version }} builds for darwin-x64, darwin-arm64, linux-x64 (musl), linux-arm64 (musl), win32-x64. Built from source on GitHub-hosted runners. Licensed under GPLv3 (includes libx264); see LICENSE.txt." \
            ffmpeg-darwin-arm64 \
            ffmpeg-darwin-arm64.gz \
            ffmpeg-darwin-x64 \
            ffmpeg-darwin-x64.gz \
            ffmpeg-linux-arm64 \
            ffmpeg-linux-arm64.gz \
            ffmpeg-linux-x64 \
            ffmpeg-linux-x64.gz \
            ffmpeg-win32-x64 \
            ffmpeg-win32-x64.gz \
            LICENSE.txt
